# ---------------------------------------------------------------
# Workflow: Update README Stats Cards
# ---------------------------------------------------------------
# Generates github-readme-stats SVG cards as static assets via
# GitHub Actions, eliminating dependency on the public Vercel
# instance which suffers from rate-limiting and stale caches.
#
# Schedule: Runs every 6 hours and on manual dispatch.
# Output:   SVG files committed to the assets/ directory.
# ---------------------------------------------------------------

name: Update README Cards

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:       # Allow manual trigger from Actions tab

jobs:
  generate-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Stats Card
      # Shows total stars, commits, PRs, issues, and contributions
      # ----------------------------------------------------------
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=dracula&include_all_commits=true&count_private=true&hide_border=true"
          path: assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # Top Languages Card
      # Shows most-used programming languages across repositories
      # ----------------------------------------------------------
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&theme=dracula&hide_border=true"
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # Pin Card — ToolsBag
      # ----------------------------------------------------------
      - name: Generate pin card for ToolsBag
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=ToolsBag&theme=dracula&hide_border=true"
          path: assets/pin-toolsbag.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # Pin Card — doctor_slam
      # ----------------------------------------------------------
      - name: Generate pin card for doctor_slam
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=doctor_slam&theme=dracula&hide_border=true"
          path: assets/pin-doctor-slam.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # Commit and push generated SVGs
      # ----------------------------------------------------------
      - name: Commit and push cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || (git commit -m "chore: update readme stats cards" && git push)
